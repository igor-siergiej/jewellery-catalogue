name: PR Checks

on:
  pull_request:
    branches: '*'

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run tsc --noEmit
      - run: bun run --filter @jewellery-catalogue/api test

  integration-test:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: read
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 5s
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: RUN_INTEGRATION_TESTS=1 bun run --filter @jewellery-catalogue/api test integration

  e2e:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: read
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 5s
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx playwright install --with-deps chromium
        working-directory: packages/web
      - run: bun run pw:e2e
        working-directory: packages/web
        env:
          CI: true
          E2E_MONGO_URI: mongodb://localhost:27018
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7
