name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: '*'

jobs:
  lint:
    uses: igor-siergiej/utils/.github/workflows/reusable-lint-test.yml@main
    secrets: inherit

  test:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run tsc --noEmit
      - run: bun --filter @jewellery-catalogue/api test

  integration-test:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: read
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27018:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 5s
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: RUN_INTEGRATION_TESTS=1 bun --filter @jewellery-catalogue/api test integration

  release:
    if: github.event_name == 'push'
    needs: [test, integration-test]
    uses: igor-siergiej/utils/.github/workflows/reusable-release.yml@main
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: git pull origin main
      - run: git submodule update --init --recursive
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Publish Docker images
        run: bash .github/workflows-utils/pipelines/scripts/publish-images.sh jewellery-catalogue ${{ steps.version.outputs.version }}

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-publish
    steps:
      - name: Trigger web deployment
        run: |
          curl -X POST --fail-with-body \
            -H "Content-Type: application/json" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n" \
            "${{ secrets.DEPLOY_WEB_URL }}" \
            -d '{"event":"deployment","timestamp":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'","ref":"${{ github.ref }}"}'
      - name: Trigger API deployment
        run: |
          curl -X POST --fail-with-body \
            -H "Content-Type: application/json" \
            -H "CF-Access-Client-Id: ${{ secrets.CF_ACCESS_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n" \
            "${{ secrets.DEPLOY_API_URL }}" \
            -d '{"event":"deployment","timestamp":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'","ref":"${{ github.ref }}"}'
