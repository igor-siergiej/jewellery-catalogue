name: CI/CD

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint

  semgrep:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep on entire repository
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/typescript \
            --config p/owasp-top-ten \
            --sarif \
            --output semgrep.sarif \
            .
      - uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif

  test:
    runs-on: ubuntu-latest
    needs: semgrep
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun tsc --noEmit
      - run: bun --filter @jewellery-catalogue/api test

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun x semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

  build-publish:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git submodule update --init --recursive
      - run: git pull origin main
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT
      - name: Publish Docker images
        run: .github/workflows-utils/pipelines/scripts/publish-images.sh jewellery-catalogue ${{ steps.version.outputs.version }}
