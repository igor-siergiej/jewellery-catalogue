# GitLab CI configuration for Jewellery Catalogue
include:
  - project: 'imapps/utils'
    file: 'templates.yml'

variables:
  PROJECT_NAME: "jewellery-catalogue"

# CI job - extends the reusable template
ci:
  extends: .ci-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

# Version release - bump version and create tag first
version-release:
  extends: .version-release-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci

# Build jewellery-catalogue-web Docker image (test build with SHA tag)
build-web-test:
  extends: .docker-build-test-template
  variables:
    APP_NAME: "jewellery-catalogue-web"
    DOCKERFILE_PATH: "packages/web/Dockerfile"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci

# Build jewellery-catalogue-api Docker image (test build with SHA tag)
build-api-test:
  extends: .docker-build-test-template
  variables:
    APP_NAME: "jewellery-catalogue-api"
    DOCKERFILE_PATH: "packages/api/Dockerfile"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci

# Publish jewellery-catalogue-web with semantic version
publish-web:
  extends: .docker-publish-template
  variables:
    APP_NAME: "jewellery-catalogue-web"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - build-web-test
    - version-release

# Publish jewellery-catalogue-api with semantic version
publish-api:
  extends: .docker-publish-template
  variables:
    APP_NAME: "jewellery-catalogue-api"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - build-api-test
    - version-release

# Update staging environment automatically
gitops-staging:
  extends: .gitops-staging-template
  variables:
    APP_IMAGES: "jewellery-catalogue-api:jewellery-catalogue-api,jewellery-catalogue-web:jewellery-catalogue-web"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - version-release
    - publish-web
    - publish-api

# Manual production deployment
gitops-production:
  extends: .production-deploy-template
  variables:
    APP_IMAGES: "jewellery-catalogue-api:jewellery-catalogue-api,jewellery-catalogue-web:jewellery-catalogue-web"
  needs:
    - version-release
    - gitops-staging
