# GitLab CI configuration for Jewellery Catalogue
include:
  - project: 'imapps/utils'
    file: 'templates.yml'

variables:
  PROJECT_NAME: "jewellery-catalogue"
  # Override registry to use local registry
  CI_REGISTRY: "192.168.68.59:5000"
  PRIVATE_REGISTRY: "192.168.68.59:5000"

# CI job - extends the reusable template
ci:
  extends: .ci-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"

# Version release - bump version and create tag after successful builds
version-release:
  extends: .version-release-monorepo-template
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci
    - build-web
    - build-api

# Build jewellery-catalogue-web Docker image (test build with SHA tag)
build-web:
  extends: .docker-build-template
  before_script:
    - until docker info; do sleep 1; done
  variables:
    APP_NAME: "jewellery-catalogue-web"
    DOCKERFILE_PATH: "packages/web/Dockerfile"
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci

# Build jewellery-catalogue-api Docker image (test build with SHA tag)
build-api:
  extends: .docker-build-template
  before_script:
    - until docker info; do sleep 1; done
  variables:
    APP_NAME: "jewellery-catalogue-api"
    DOCKERFILE_PATH: "packages/api/Dockerfile"
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - ci

# Build and publish jewellery-catalogue-web with semantic version
publish-web:
  extends: .docker-publish-rebuild-template
  before_script:
    - until docker info; do sleep 1; done
  variables:
    APP_NAME: "jewellery-catalogue-web"
    DOCKERFILE_PATH: "packages/web/Dockerfile"
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - job: version-release
      artifacts: true

# Build and publish jewellery-catalogue-api with semantic version
publish-api:
  extends: .docker-publish-rebuild-template
  before_script:
    - until docker info; do sleep 1; done
  variables:
    APP_NAME: "jewellery-catalogue-api"
    DOCKERFILE_PATH: "packages/api/Dockerfile"
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_TLS_VERIFY: ""
    DOCKER_CERT_PATH: ""
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - job: version-release
      artifacts: true

# Update staging environment automatically
gitops-staging:
  extends: .gitops-staging-helm-template
  variables:
    HELM_VALUES: "apps/workloads/jewellery-catalogue/values-staging.yaml,api.image.tag;apps/workloads/jewellery-catalogue/values-staging.yaml,web.image.tag"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
  needs:
    - job: version-release
      artifacts: true
    - job: publish-web
    - job: publish-api

# Manual production deployment
gitops-production:
  extends: .production-deploy-helm-template
  variables:
    HELM_VALUES: "apps/workloads/jewellery-catalogue/values-production.yaml,api.image.tag;apps/workloads/jewellery-catalogue/values-production.yaml,web.image.tag"
  needs:
    - job: version-release
      artifacts: true
    - job: gitops-staging
